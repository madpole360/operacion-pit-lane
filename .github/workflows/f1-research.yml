name: 🏎️ F1 Madrid — Investigación Diaria

on:
  schedule:
    # Ejecutar cada hora en punto hasta las 13:00 Madrid (CEST = UTC+2)
    # 10:00 → 8:00 UTC | 11:00 → 9:00 UTC | 12:00 → 10:00 UTC | 13:00 → 11:00 UTC
    - cron: '0 8 * * *'
    - cron: '0 9 * * *'
    - cron: '0 10 * * *'
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  investigate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependencias
        run: pip install -r requirements.txt

      - name: 🔍 Ejecutar agente investigador
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "Key length: ${#ANTHROPIC_API_KEY}"
          echo "Key prefix: ${ANTHROPIC_API_KEY:0:20}..."
          python scripts/research_agent.py

      - name: 📤 Publicar informe en GitHub Pages
        run: |
          git config --local user.email "pit-lane-bot@github-actions"
          git config --local user.name "🏎️ Pit Lane Bot"
          git add docs/
          git add data/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "📊 Informe diario $(date +'%Y-%m-%d')"
          git push
