name: 📝 Procesar entrada manual

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependencias
        run: pip install -r requirements.txt

      - name: 🔍 Procesar entrada manual
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/process_manual_input.py

      - name: 🔄 Regenerar HTML
        run: python -c "from scripts.generate_pages import build_site; import json; from pathlib import Path; build_site(json.loads((Path('docs/latest.json')).read_text(encoding='utf-8')))"

      - name: 📤 Publicar cambios
        run: |
          git config --local user.email "pit-lane-bot@github-actions"
          git config --local user.name "🏎️ Pit Lane Bot"
          git add docs/
          git diff --staged --quiet || git commit -m "📝 Entrada manual procesada: $(date +'%Y-%m-%d %H:%M')"
          git pull --rebase origin main && git push
